instruction:
  title: "MNEMOSYNE LP"
  purpose: >
    Steamおよびitch.ioでの短編有料DL販売に向けた事前認知獲得LPの構築。
    ゲームの世界観と感情体験を先行して伝え、リリース時に購入・ウィッシュリスト登録へ誘導する。
    Seep Logos の名刺代わりの作品として、スタジオのクリエイティブ水準も示す。
  target_user: >
    20〜35歳。文学・映画・インディーゲームに親しむ層。
    「IMMORTALITY」「What Remains of Edith Finch」「BEFORE YOUR EYES」などの体験者が主軸。
    記憶・喪失・アイデンティティをテーマにした作品に関心を持つ副軸層も含む。
    論理的説得より感情的共鳴によって動く層であり、コピーの密度よりも余白と問いの鋭さが刺さる。
  page_type: "lp"

site_design:
  concept: >
    訪問者が「自分の記憶を消すとはどういうことか」という問いの入口に立つ体験。
    ゲームの説明をするのではなく、ゲームが問う問いをLPそのもので体験させる設計。
    「忘れることは、罪か。」という核心の問いを軸に、世界観の断片を積み上げていく。
  key_message: >
    他者の記憶を消す仕事を10年続けた人間が、自分の消された記憶に気づく。
    90〜120分。答えは出ない。しかし問いが残る。
  cta: >
    Steamウィッシュリスト登録（発売前フェーズ）。
    リリース後は Steam / itch.io 購入ページへのリンクに切り替え。
    メールアドレス登録（リリース通知）を副CTAとして設置。
  reference_patterns:
    - pattern-H_dark-immersive
    - pattern-E_scrollytelling
  constraints:
    - モバイルファースト（ターゲット層のSNS流入を前提）
    - 日本語のみ（初期フェーズ。英語対応は海外展開時に別途対応）
    - 素材なし状態から着手可能な設計（キービジュアル・ロゴ未確定のため、テキストと幾何学・タイポグラフィで世界観を構築する）
    - 没入を妨げるUI要素の排除（感情メーター・数値化されたゲームシステム説明は不要）
    - アニメーション過多禁止（世界観の静けさを壊さない範囲で最小限のモーション）

page_structure:
  section_1_hero:
    label: "HERO（フルスクリーン）"
    purpose: "タイトルと核心の問いで訪問者を世界の入口に立たせる"
    copy_direction: >
      「忘れることは、罪か。」を中心に据える。
      副コピーは「他者の記憶を消す仕事を10年続けた——そして自分の消された記憶に気づいた」程度。
      情報量は最小限。余白と沈黙が世界観を語る。
    visual_direction: "深黒背景。タイトルロゴを細いセリフ系フォントで。スキャンラインまたはノイズテクスチャを極低透明度で重ねる。"
    cta: "ウィッシュリストに追加（スクロールを促す矢印も設置）"

  section_2_world:
    label: "WORLD（世界観紹介）"
    purpose: "2040年代の日本・記憶外在化技術（MET）という世界の輪郭を伝える"
    copy_direction: >
      「西暦2040年代。記憶は、整理できる時代になった。」から始まる短い断片テキストを積み上げる。
      専門用語（MET、アクセス封鎖、リーク）を断片的に配置し、世界の密度を示す。
      説明文ではなく、世界の空気を漂わせるコピー。
    visual_direction: "幾何学的なラインと数値断片をアクセントカラーで配置。テキストブロックは左右非対称に。"

  section_3_story:
    label: "STORY（物語・主人公紹介）"
    purpose: "桐島セツという人物と、彼女の置かれた状況を伝える"
    copy_direction: >
      主人公の名前・年齢・職業と、物語の核心（「失っているもの」「恐れているもの」）を簡潔に。
      ゲームあらすじではなく、プレイヤーが引き継ぐことになる「問いの設計図」として書く。
    visual_direction: "キャラクタービジュアル未確定のため、テキストとシルエット的な暗色領域で構成。"

  section_4_system:
    label: "SYSTEM（ゲームプレイ）"
    purpose: "記憶の分類というゲームプレイの体験を言葉で先取りさせる"
    copy_direction: >
      「あなたは記憶の断片を受け取る。整理するか、保持するか、封鎖するか。」
      「正解はない。しかし、選択には重さがある。」
      プレイ時間（90〜120分）とエンディングの存在をさりげなく示す。
    visual_direction: "3つの選択カード（整理・保持・封鎖）をUI的に表現。アイコンまたはテキストカードで。"

  section_5_cta:
    label: "CTA（ウィッシュリスト・メール登録）"
    purpose: "感情的に高まった状態でアクションを促す"
    copy_direction: >
      「問いは、あなたの中に残る。」または「記憶は、あなたが選ぶ。」
      Steamウィッシュリスト登録ボタンを主CTA、メール登録を副CTAとして設置。
    visual_direction: "HERO背景と同系統のダーク背景。タイトルロゴを再掲。SNSアイコンをフッター上部に。"

deliverables:
  - visual_instruction: "web/instructions/web-mnemosyne-lp-20260330-visual.md"
  - html_output: "web/output/web-mnemosyne-lp-20260330.html"

notes: >
  現フェーズは素材ゼロの状態からの着手。キービジュアル・キャラクターイラスト・ロゴは未確定。
  テキストと幾何学・タイポグラフィで世界観を構築できる設計を優先する。
  参照作品のトーン感（IMMORTALITY、Edith Finch）を意識した静かで密度の高いデザインを目指す。
  Steamウィッシュリスト登録URLは仮置き（#）で対応。発売日未定のため「近日公開」表記。
  メディア展開（短編ゲーム → 短編小説 → フルプライス版）の布石として、
  ゲーム単体の宣伝に留まらずIPとしての世界観の入口として機能するLPにすること。
