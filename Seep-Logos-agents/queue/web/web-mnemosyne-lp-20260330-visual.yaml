task:
  description: >
    MNEMOSYNE LP のビジュアル仕様書（visual instruction）を作成する。
    素材ゼロ状態（キービジュアル・ロゴ・キャラクターイラスト未確定）を前提に、
    テキストと幾何学・タイポグラフィだけで世界観を体現できるビジュアル設計を定義すること。
    以下のビジュアルコンセプトに基づき、各セクションの具体的なレイアウト指示・
    タイポグラフィ仕様・カラーコード・モーション方針を記述した仕様書として完成させる。

  visual_concept: >
    「忘却の静寂」——深淵な暗黒の中に、崩壊しかけた記憶の断片が漂う。
    デジタルとアナログの境界が溶けた2040年代の荒廃した静けさ。
    美しさではなく、問いの重さを体で感じさせるビジュアル言語。

  color_palette:
    main: "#0A0A0F（ほぼ黒・深宇宙色）/ #F0EDE8（くすんだオフホワイト・古い紙色）"
    sub: "#4A7C9E（錆びた青・古いモニターの残光）/ #8B8680（消えかけたグレー）"
    accent: "#C8A882（褪せたアンバー・記憶の残像）"
    forbidden: >
      純白（#FFFFFF）、純黒（#000000）——コントラストが鋭すぎると没入が壊れる。
      彩度の高い暖色（赤・オレンジ・黄）——感情的刺激が強すぎ世界観の静けさを破壊する。
      青紫系の明るいグラデーション（tech感・未来感が出すぎてしまう）。

  tone: "ダーク・静謐・崩壊的な美しさ・緊張の余白"

  typography_direction: >
    日本語: 細ウエイトの明朝系（Noto Serif JP Weight 100〜300 を基本とする）。
    ゴシック系は原則禁止。ただしシステムUI的な数値表示（MET用語・座標・コード断片）に限り
    モノスペース系（例: JetBrains Mono）を使用可。
    英字: 細セリフ系（Cormorant Garamond または Playfair Display の細ウエイト）。
    文字サイズ階層: ヒーローコピーは大胆に大きく、本文は読みやすい最小サイズで抑制する。
    行間は広め（line-height: 1.9〜2.2）——余白が世界観を語る。
    文字のカーニングは緩め。詰まった文字は禁止。

  section_visual_notes:
    section_1_hero: >
      深黒（#0A0A0F）のフルスクリーン背景。
      極低透明度（opacity: 0.04〜0.06）のスキャンラインまたはノイズテクスチャを重ねる。
      「忘れることは、罪か。」は画面中央やや上。細明朝で大きく。
      タイトル「MNEMOSYNE」は細セリフ英字で、コピーの下に小さく配置。
      スクロール誘導の矢印は極細ラインで、点滅ではなくフェードで呼吸させる。
    section_2_world: >
      左寄せのテキストブロックと右側に散在する数値・記号断片で非対称構成。
      MET・アクセス封鎖・リークといった用語をモノスペースフォントで小さく配置。
      ライン要素は1px未満の細さで。アクセントカラー（#4A7C9E）を節度を持って使用。
    section_3_story: >
      「桐島セツ」という名前を画面に提示するとき、名前の上下にわずかなスペースを設け、
      その人物の"重さ"を余白で表現する。
      シルエット的な暗色領域は実体のない影として、テキストの背景に溶け込む程度に。
    section_4_system: >
      3つの選択カード（整理・保持・封鎖）はシンプルなボーダーカードで表現。
      カード内はテキストのみ。アイコンを使う場合は極細ラインの幾何学形のみ許可。
      カードの背景は #0F0F14 程度のわずかに浮いたダーク色。
    section_5_cta: >
      HEROセクションと同系統の深黒背景に戻る。
      CTAボタンは塗りつぶしではなく細ボーダーのゴースト型。
      ホバー時はボーダーが淡く光る程度のアニメーション。
      「記憶は、あなたが選ぶ。」のコピーをボタン上方に静かに配置。

  forbidden_elements:
    - グラデーション背景（ブランド感・明るさが出てしまう）
    - 浮き上がるカードシャドウ（ゲームUIのチープさにつながる）
    - アイコンフォント（Font Awesome等のUIアイコン——世界観と合わない）
    - 視差スクロール（parallax）による背景画像移動（素材ゼロのため実装不可。また速度感が世界観を壊す）
    - ハンバーガーメニュー（LPのため不要。ナビゲーションは最小化）
    - カウントダウンタイマー（商業感・煽りが出る）
    - ソーシャルプルーフ的な表現（レビュー数・フォロワー数など実績の数値化）
    - 過剰なアニメーション（スクロールのたびに要素がポップインする演出は禁止）

